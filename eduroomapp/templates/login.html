<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - EduRoom Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .auth-card { max-width: 400px; width: 100%; border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card auth-card shadow-lg border-0 p-4 p-md-5 bg-white">
        <div class="text-center mb-4">
            <div class="bg-primary text-white d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-school fs-3"></i>
            </div>
            <h4 class="fw-bold text-dark mb-1">Chào mừng trở lại!</h4>
            <p class="text-muted small">Đăng nhập để đặt phòng học</p>
        </div>

        <form action="index.html"> <div class="mb-3">
                <label for="email" class="form-label fw-semibold small">Mã số Sinh viên / Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="email" placeholder="Nhập MSSV hoặc Email" required>
                </div>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label fw-semibold small mb-0">Mật khẩu</label>
                    <a href="#" class="text-decoration-none small text-primary">Quên mật khẩu?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small text-muted" for="remember">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">
                Đăng Nhập
            </button>
        </form>

        <div class="text-center mt-2">
            <p class="small text-muted mb-0">Chưa có tài khoản? <a href="register.html" class="fw-bold text-decoration-none">Đăng ký ngay</a></p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
