{% extends 'layout/base.html' %}

{% block title %}Đăng Ký - EduRoom Booking{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5" style="max-width: 550px; width: 100%;">

        <div class="text-center mb-4">
            <div class="bg-success bg-opacity-10 text-success d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                 style="width: 70px; height: 70px;">
                <i class="fa-solid fa-user-plus fs-2"></i>
            </div>
            <h4 class="fw-bold text-dark mb-1">Tạo Tài Khoản</h4>
            <p class="text-muted small">Điền thông tin để tham gia hệ thống</p>
        </div>

        <form action="/register" method="POST">
            {% if err_msg %}
            <div class="alert alert-danger text-center shadow-sm rounded-3 fw-semibold small py-2 mb-3">
                <i class="fa-solid fa-triangle-exclamation me-1"></i> {{ err_msg }}
            </div>
            {% endif %}
            <div class="mb-3">
                <label for="fullname" class="form-label fw-semibold small text-secondary">Họ và tên</label>
                <input type="text" class="form-control bg-light" id="fullname" name="fullname"
                       placeholder="VD: Nguyễn Văn A" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold small text-secondary">Địa chỉ Email</label>
                <input type="email" class="form-control bg-light" id="email" name="email"
                       placeholder="VD: nguyenvana@gmail.com / edu.vn" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="role" class="form-label fw-semibold small text-secondary">Chức vụ</label>
                    <select class="form-select bg-light" id="role" name="role" required>
                        {% if roles %}
                        <option value="" selected>-- Chọn vai trò --</option>
                        {% for r in roles %}
                        <option value="{{r.name}}">{{r.name}}</option>
                        {% endfor %}
                        {% endif %}
                    </select>
                </div>
                <div class="col-md-6 mt-3 mt-md-0">
                    <label for="username" class="form-label fw-semibold small text-secondary">Tài khoản
                        (Username)</label>
                    <input type="text" class="form-control bg-light" id="username" name="username"
                           placeholder="Nhập mã SV/GV" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold small text-secondary">Mật khẩu</label>
                <input type="password" class="form-control bg-light" id="password" name="password"
                       placeholder="Tạo mật khẩu" required>
            </div>

            <div class="mb-4">
                <label for="confirm_password" class="form-label fw-semibold small text-secondary">Xác nhận mật
                    khẩu</label>
                <input type="password" class="form-control bg-light" id="confirm_password" name="confirm_password"
                       placeholder="Nhập lại mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-3 rounded-3 shadow-sm">
                Đăng Ký Tài Khoản
            </button>
        </form>

        <div class="text-center border-top pt-3">
            <p class="small text-muted mb-0">Đã có tài khoản? <a href="/login" class="fw-bold text-decoration-none">Đăng
                nhập tại đây</a></p>
        </div>
    </div>
</div>
{% endblock %}
